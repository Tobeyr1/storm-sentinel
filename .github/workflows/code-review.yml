name: Code Review

on:
  push:
    branches: [ main, develop, feature/*, bugfix/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'

    - name: Install dependencies
      run: flutter pub get

    - name: Dart Format Check
      run: dart format --dry-run --set-exit-if-changed .

    - name: Flutter Analyze
      run: flutter analyze

    - name: Flutter Test
      run: flutter test

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Add any Python dependencies here

    - name: AI Code Review
      run: |
        # Get changed files
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '\.dart$')
        if [ -n "$CHANGED_FILES" ]; then
          python .trae/scripts/ai_code_review.py $CHANGED_FILES
        else
          echo "No Dart files changed"
        fi

    - name: Upload AI Review Results
      uses: actions/upload-artifact@v4
      with:
        name: ai-review-results
        path: .trae/reviews/
