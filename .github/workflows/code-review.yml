name: Code Review

on:
  push:
    branches: [ main, develop, feature/*, bugfix/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'

    - name: Install dependencies
      run: flutter pub get

    - name: Dart Format Check
      run: dart format --output=none --set-exit-if-changed .

    - name: Flutter Analyze
      run: flutter analyze

    - name: Flutter Test
      run: flutter test

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Add any Python dependencies here

    - name: AI Code Review
      run: |
        # Get changed files
        echo "Getting changed Dart files..."
        set -x
        # Check if there's at least one commit
        if git rev-parse --quiet --verify HEAD~1 > /dev/null; then
          echo "Comparing with HEAD~1..."
          # Run git diff and capture output
          git diff_output=$(git diff --name-only HEAD~1 HEAD 2>&1)
          echo "Git diff output: $git_diff_output"
          # Run grep and capture output
          CHANGED_FILES=$(echo "$git_diff_output" | grep '\.dart$')
          echo "Changed Dart files: $CHANGED_FILES"
        else
          echo "No previous commit found, using git status instead..."
          # Run git status and capture output
          git_status_output=$(git status --porcelain 2>&1)
          echo "Git status output: $git_status_output"
          # Run grep and awk and capture output
          CHANGED_FILES=$(echo "$git_status_output" | grep '\.dart$' | awk '{print $2}')
          echo "Changed Dart files: $CHANGED_FILES"
        fi
        # Always succeed, even if no Dart files are found
        echo "Running AI code review..."
        if [ -n "$CHANGED_FILES" ]; then
          echo "Running AI code review on changed files..."
          python -v .trae/scripts/ai_code_review.py $CHANGED_FILES || echo "AI code review failed, but continuing..."
        else
          echo "No Dart files changed, skipping AI code review..."
        fi
        set +x

    - name: Upload AI Review Results
      uses: actions/upload-artifact@v4
      with:
        name: ai-review-results
        path: .trae/reviews/
