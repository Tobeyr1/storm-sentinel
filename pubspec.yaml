name: storm_sentinel
description: Real-time severe weather alerts with smart anomaly detection

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

flutter:
  uses-material-design: true

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management + DI (对应 Kotlin: Hilt + ViewModel + StateFlow)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking (对应 Kotlin: Retrofit + OkHttp)
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # Routing (对应 Kotlin: Navigation Compose)
  go_router: ^14.8.1

  # Data Models (对应 Kotlin: data class + @Serializable)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Storage (对应 Kotlin: DataStore / SharedPreferences)
  shared_preferences: ^2.3.4

  # Logging (对应 Kotlin: Timber)
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation (对应 Kotlin: KSP / KAPT)
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Riverpod Lint (对应 Kotlin: Detekt 自定义规则)
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3
