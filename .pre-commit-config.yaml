repos:
  - repo: local
    hooks:
      - id: dart-format
        name: Dart Format
        entry: dart format
        language: system
        pass_filenames: true
        types: [dart]

      - id: flutter-analyze
        name: Flutter Analyze
        entry: flutter analyze
        language: system
        pass_filenames: false

      - id: flutter-test
        name: Flutter Test
        entry: flutter test
        language: system
        pass_filenames: false

      - id: ai-code-review
        name: AI Code Review
        entry: python .trae/scripts/ai_code_review.py
        language: system
        pass_filenames: true
        types: [dart]
